name = "sudoku-api"
main = "src/index.ts"
compatibility_date = "2026-04-29"

# Routing — bind sudoku.appfoundry.cc to this Worker.
# `custom_domain = true` makes Cloudflare manage the DNS record for this
# subdomain. If a manual A/CNAME for sudoku.appfoundry.cc already exists in the
# zone, the first `wrangler deploy` will fail with a clear conflict message —
# delete that manual record in the dashboard, then re-deploy.
[[routes]]
pattern = "sudoku.appfoundry.cc"
custom_domain = true

# Plain (non-secret) vars. Email-from address and the timezone used to derive
# "today's" puzzle date. Plus per-platform version pins for the in-app
# update prompt — clients fetch /v1/version on launch and surface a banner
# / blocker if their bundle is behind.
#
# IMPORTANT — update rule for the version pins:
#   Only bump *_CURRENT_VERSION *AFTER* you've confirmed the release is
#   actually live in the store (App Store / Play Store), NOT when you
#   upload it. Otherwise the in-app banner will tell users an update is
#   available before the store has it, and they'll tap "Update" only to
#   find no new version waiting.
#
#   *_MIN_REQUIRED_VERSION should only move when you ship a backend-breaking
#   change that older clients can't tolerate. Treat this as the "force
#   update" tripwire — rarely touched.
[vars]
EMAIL_FROM = "Sudoku <noreply@appfoundry.cc>"
DAILY_TIMEZONE = "Australia/Sydney"
IOS_CURRENT_VERSION = "1.0.6"
IOS_MIN_REQUIRED_VERSION = "1.0.6"
ANDROID_CURRENT_VERSION = "1.0.6"
ANDROID_MIN_REQUIRED_VERSION = "1.0.6"

# Secrets (do NOT put them here — they're set via `wrangler secret put`):
#   RESEND_API_KEY    Resend API key for sending OTP emails.

# D1 database. Run `npm run db:create`, then paste the returned database_id
# here, replacing the placeholder.
[[d1_databases]]
binding = "DB"
database_name = "sudoku"
database_id = "fc1e0bcc-a5e6-4075-b786-fe248ecd118d"
migrations_dir = "migrations"

# Crons:
#   "0 * * * *"  — hourly: ensure today's + tomorrow's daily puzzles exist
#                  in D1 so user-facing requests never trigger slow generation.
#                  Idempotent: no-op if both rows are already there.
#   "* * * * *"  — every minute: scan multiplayer games for expired turns and
#                  trigger forfeits (records skip + rotates active player).
[triggers]
crons = ["0 * * * *", "* * * * *"]
